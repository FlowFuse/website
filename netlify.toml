[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    Content-Security-Policy = "frame-ancestors 'none';"

[[redirects]]
from = "http://flowforge.com/*"
to = "http://flowfuse.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://flowforge.com/*"
to = "https://flowfuse.com/:splat"
status = 301
force = true

[[redirects]]
from = "http://www.flowforge.com/*"
to = "http://flowfuse.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://www.flowforge.com/*"
to = "https://flowfuse.com/:splat"
status = 301
force = true

[[redirects]]
from = "http://flowfuze.com/*"
to = "http://flowfuse.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://flowfuze.com/*"
to = "https://flowfuse.com/:splat"
status = 301
force = true

[[redirects]]
from = "http://www.flowfuze.com/*"
to = "http://flowfuse.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://www.flowfuze.com/*"
to = "https://flowfuse.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://flowfuse.io/*"
to = "https://flowfuse.com/:splat"
status = 301
force = true

[dev]
port = 3000
targetPort = 3000
framework = "#static"
command = "npm run dev"
autoLaunch = false

[build]
command = "npm run build:nuxt"
publish = "nuxt/.output/public"

[context.deploy-preview]
command = "npm run build:nuxt"

[context.branch-deploy]
command = "npm run build:nuxt"

[[plugins]]
package = "netlify-plugin-cache"
  [plugins.inputs]
  paths = [
    "nuxt/public/img", # Image disk cache
    ".cache/images" # Image processing cache
  ]
