[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Content-Security-Policy = "frame-ancestors 'self';"

[[redirects]]
from = "http://flowforge.com/*"
to = "http://flowfuse.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://flowforge.com/*"
to = "https://flowfuse.com/:splat"
status = 301
force = true

[[redirects]]
from = "http://www.flowforge.com/*"
to = "http://flowfuse.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://www.flowforge.com/*"
to = "https://flowfuse.com/:splat"
status = 301
force = true

[[redirects]]
from = "http://flowfuze.com/*"
to = "http://flowfuse.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://flowfuze.com/*"
to = "https://flowfuse.com/:splat"
status = 301
force = true

[[redirects]]
from = "http://www.flowfuze.com/*"
to = "http://flowfuse.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://www.flowfuze.com/*"
to = "https://flowfuse.com/:splat"
status = 301
force = true

[[redirects]]
from = "https://flowfuse.io/*"
to = "https://flowfuse.com/:splat"
status = 301
force = true

[dev]
port = 8080
framework = "#static"
command = "npx @11ty/eleventy --quiet --watch"
autoLaunch = false

[build]
command = "npm run build:nuxt"
publish = "nuxt/.output/public"

[functions]
directory = "nuxt/.netlify/functions-internal"
included_files = ["nuxt/.output/**"]

[context.deploy-preview]
command = "npm run build:nuxt"

[context.branch-deploy]
command = "npm run build:nuxt"

[[plugins]]
package = "netlify-plugin-cache"
  [plugins.inputs]
  paths = [
    "nuxt/public/img", # Eleventy Image Disk Cache
    ".cache/images" # Eleventy image processing cache
  ]
