name: Tests

on: push

jobs:
  test_website:
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.GH_CI_READONLY_APP_ID }}
          private-key: ${{ secrets.GH_CI_READONLY_APP_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            website
            flowfuse
            blueprint-library
      - name: Check out website repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: 'website'
          token: ${{ steps.generate_token.outputs.token }}
      - name: Check out FlowFuse/flowfuse repository (to access the docs)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: 'FlowFuse/flowfuse'
          ref: main
          path: 'flowfuse'
          token: ${{ steps.generate_token.outputs.token }}
      - name: Check out FlowFuse/blueprint-library repository (to access the blueprints)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: 'FlowFuse/blueprint-library'
          ref: main
          path: 'blueprint-library'
          token: ${{ steps.generate_token.outputs.token }}       
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: './website/package-lock.json'
      - run: npm run docs
        working-directory: 'website'
      - run: npm run blueprints
        working-directory: 'website'
      - name: Install Dependencies
        run: npm install
        working-directory: 'website'
      - name: Build the forge
        run: npm run build:nuxt:skip-images
        working-directory: 'website'
      - name: Check links
        uses: untitaker/hyperlink@fb5bb9c5011a3d143a54b4b30aedc30ec5bc0f89 # 0.2.0
        with:
          args: website/nuxt/.output/public/ --check-anchors --sources website/src
