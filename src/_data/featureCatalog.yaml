sections:
  - id: empower
    label: Empower
    features:
      - id: ff-expert
        label: FlowFuse Expert
        description: "AI-powered assistant that supports, enables, and speeds up workflows across FlowFuse and Node-RED, with access to MCP servers defined in your Node-RED instances through a single interface."
        docsLink: /docs/user/expert
        changelog:
          - url: /changelog/2026/02/ff-expert-update-banner/
            release: "2.28"
        subfeature: false
        solutions: [mes, scada, uns, edge-connectivity, it-ot-middleware, data-integration]
        showOnPricing: true
        tags: [cloud, self-hosted]
        cloud:
          enterprise:
            value: true
        selfHosted:
          enterprise:
            value: "Contact Support to enable"

      - id: ff-expert-application-building
        label: Application Building
        description: "Describe what you want to build and FlowFuse Expert assembles it on your workspace, adding tabs, wiring nodes, and configuring properties."
        docsLink: /docs/user/expert/chat/
        changelog:
          - url: /changelog/2026/05/expert-application-building/
            release: "2.30"
        subfeature: true
        solutions: [mes, scada, uns, edge-connectivity, it-ot-middleware, data-integration]
        showOnPricing: false
        tags: [cloud, self-hosted]
        cloud:
          enterprise:
            value: true
        selfHosted:
          enterprise:
            value: 'contact'
            note: "On request; requires assistant tokens and the Expert MQTT bridge"

      - id: ff-expert-support
        label: Support Mode
        description: "Chat-based assistance for FlowFuse and Node-RED, including Node-RED instance management through natural language."
