        solutions: [mes, scada, uns, edge-connectivity, it-ot-middleware, data-integration]
        showOnPricing: true
        tags: [cloud, self-hosted]
        cloud:
          enterprise:
            value: true
        selfHosted:
          enterprise:
            value: true
            dimmed: true

      - id: ff-expert-insights
        label: Insights Mode
